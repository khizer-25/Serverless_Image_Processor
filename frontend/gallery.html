<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Cloud Image Processor</h2>

    <div>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
    </div>
</nav>

<div class="container">

    <h1>Processed Images Gallery</h1>

    <div id="gallery"></div>

</div>

<script>

const API_URL =
"https://n15fhozm28.execute-api.us-east-1.amazonaws.com/prod/images";

async function loadImages(){

    const response =
    await fetch(API_URL);

    const images =
    await response.json();

    const gallery =
    document.getElementById("gallery");

    gallery.innerHTML = "";

    images.reverse().forEach(image => {

        gallery.innerHTML += `

        <div class="card">

            <img
                src="${image.thumbnail}"
                alt="thumbnail"
            >

            <h3>${image.original}</h3>

            <p>
                ${new Date(image.uploadDate)
                .toLocaleString()}
            </p>

            <div class="links">

                <a target="_blank"
                href="${image.compressed}">
                Compressed
                </a>

                <a target="_blank"
                href="${image.low}">
                Low
                </a>

                <a target="_blank"
                href="${image.webp}">
                WebP
                </a>

                <a target="_blank"
                href="${image.png}">
                PNG
                </a>

            </div>

        </div>

        `;
    });
}

loadImages();

</script>

</body>
</html>
