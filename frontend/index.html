<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cloud Image Processor</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>☁️ Cloud Image Processor</h1>

    <p class="subtitle">
        
    </p>

    <div class="upload-card">

        <div class="file-upload">

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden
    >

    <label
        for="imageInput"
        class="upload-label"
    >
        <div class="upload-icon">
            📸
        </div>

        <h3>Select an Image</h3>

        <p>
            Click here to browse and upload
            JPG, PNG, WEBP images
        </p>

        <span id="selectedFile">
            No file selected
        </span>
    </label>

</div>

        <button onclick="uploadImage()">
            Upload Image
        </button>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <p id="message"></p>

    </div>

    <div id="previewSection"></div>

</div>

<script src="app.js"></script>

</body>
</html>
